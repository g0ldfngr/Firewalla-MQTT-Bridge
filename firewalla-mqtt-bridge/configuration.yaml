# ── Network Status Binary Sensor ───────────────────────────────────────────

binary_sensor:
  # Network connected status
  - name: "Firewalla Network Connected"
    state_topic: "firewalla/network/status"
    value_template: "{{ value_json.connected }}"
    payload_on: "true"
    payload_off: "false"
    icon: "mdi:network-check"

# ── Alarm Text Sensor ──────────────────────────────────────────────────────

sensor:
  # Latest alarm message
  - name: "Firewalla Latest Alarm"
    state_topic: "firewalla/network/alarms"
    value_template: "{{ value_json[0].message if value_json | length > 0 else 'No alarms' }}"
    icon: "mdi:alert"

# ── Box Info Sensor ────────────────────────────────────────────────────────

sensor:
  # Box model
  - name: "Firewalla Box Model"
    state_topic: "firewalla/network/box_info"
    value_template: "{{ value_json.model }}"
    icon: "mdi:router-network"

  # Box version
  - name: "Firewalla Box Version"
    state_topic: "firewalla/network/box_info"
    value_template: "{{ value_json.version }}"
    icon: "mdi:information-outline"

  # Public IP
  - name: "Firewalla Public IP"
    state_topic: "firewalla/network/box_info"
    value_template: "{{ value_json.publicIp }}"
    icon: "mdi:ip-outline"
