# Firewalla MQTT Bridge - Home Assistant Configuration
# Place this in your Home Assistant configuration directory

# ── Network Status Sensors ──────────────────────────────────────────────────

sensor:
  # Network connection type
  - name: "Firewalla Connection Type"
    state_topic: "firewalla/network/status"
    value_template: "{{ value_json.connectionType }}"
    device_class: enum
    options:
      - Wired
      - Wireless
      - Cellular
      - Unknown

  # Public IP address
  - name: "Firewalla Public IP"
    state_topic: "firewalla/network/status"
    value_template: "{{ value_json.publicIp }}"
    icon: "mdi:ip-outline"

  # Network uptime
  - name: "Firewalla Uptime"
    state_topic: "firewalla/network/status"
    value_template: "{{ value_json.uptime | round(0) }}"
    unit_of_measurement: "seconds"
    icon: "mdi:timer-outline"

  # Live download speed
  - name: "Firewalla Download Speed"
    state_topic: "firewalla/network/live_stats"
    value_template: "{{ value_json.downloadMbps | round(1) }}"
    unit_of_measurement: "Mbps"
    device_class: data_rate
    state_class: measurement
    icon: "mdi:download-network-outline"

  # Live upload speed
  - name: "Firewalla Upload Speed"
    state_topic: "firewalla/network/live_stats"
    value_template: "{{ value_json.uploadMbps | round(1) }}"
    unit_of_measurement: "Mbps"
    device_class: data_rate
    state_class: measurement
    icon: "mdi:upload-network-outline"

  # Active connections
  - name: "Firewalla Active Connections"
    state_topic: "firewalla/network/live_stats"
    value_template: "{{ value_json.activeConnections }}"
    state_class: measurement
    icon: "mdi:connection"

  # Total connections
  - name: "Firewalla Total Connections"
    state_topic: "firewalla/network/live_stats"
    value_template: "{{ value_json.totalConnections }}"
    state_class: measurement
    icon: "mdi:connection-network"

# ── Device Status Sensors ──────────────────────────────────────────────────

  # Online device count
  - name: "Firewalla Online Devices"
    state_topic: "firewalla/network/hosts_summary"
    value_template: "{{ value_json.online }}"
    state_class: measurement
    icon: "mdi:devices"

  # Offline device count
  - name: "Firewalla Offline Devices"
    state_topic: "firewalla/network/hosts_summary"
    value_template: "{{ value_json.offline }}"
    state_class: measurement
    icon: "mdi:devices-off"

  # Total device count
  - name: "Firewalla Total Devices"
    state_topic: "firewalla/network/hosts_summary"
    value_template: "{{ value_json.total }}"
    state_class: measurement
    icon: "mdi:devices-clusters"

# ── Data Usage Sensors ─────────────────────────────────────────────────────

  # Monthly download
  - name: "Firewalla Monthly Download"
    state_topic: "firewalla/network/usage"
    value_template: "{{ (value_json.downloadBytes / 1000000000) | round(2) }}"
    unit_of_measurement: "GB"
    device_class: data_size
    state_class: total_increasing
    icon: "mdi:download"

  # Monthly upload
  - name: "Firewalla Monthly Upload"
    state_topic: "firewalla/network/usage"
    value_template: "{{ (value_json.uploadBytes / 1000000000) | round(2) }}"
    unit_of_measurement: "GB"
    device_class: data_size
    state_class: total_increasing
    icon: "mdi:upload"

  # Monthly total
  - name: "Firewalla Monthly Total"
    state_topic: "firewalla/network/usage"
    value_template: "{{ ((value_json.downloadBytes + value_json.uploadBytes) / 1000000000) | round(2) }}"
    unit_of_measurement: "GB"
    device_class: data_size
    state_class: total_increasing
    icon: "mdi:database"

# ── Speedtest Sensors ──────────────────────────────────────────────────────

  # Latest speedtest download
  - name: "Firewalla Speedtest Download"
    state_topic: "firewalla/network/speedtest"
    value_template: "{{ value_json.latest.downloadMbps | round(1) }}"
    unit_of_measurement: "Mbps"
    device_class: data_rate
    state_class: measurement
    icon: "mdi:speedometer"
    availability_template: "{{ value_json.latest is not none }}"

  # Latest speedtest upload
  - name: "Firewalla Speedtest Upload"
    state_topic: "firewalla/network/speedtest"
    value_template: "{{ value_json.latest.uploadMbps | round(1) }}"
    unit_of_measurement: "Mbps"
    device_class: data_rate
    state_class: measurement
    icon: "mdi:speedometer"
    availability_template: "{{ value_json.latest is not none }}"

  # Latest speedtest latency
  - name: "Firewalla Speedtest Latency"
    state_topic: "firewalla/network/speedtest"
    value_template: "{{ value_json.latest.latency | round(0) }}"
    unit_of_measurement: "ms"
    device_class: latency
    state_class: measurement
    icon: "mdi:latency"
    availability_template: "{{ value_json.latest is not none }}"

# ── Alarm Sensors ──────────────────────────────────────────────────────────

  # Active alarms count
  - name: "Firewalla Active Alarms"
    state_topic: "firewalla/network/alarms_summary"
    value_template: "{{ value_json.active }}"
    state_class: measurement
    icon: "mdi:alert-circle-outline"

