# Firewalla Network Dashboard - Lovelace Configuration
# Add this to your Home Assistant Lovelace configuration

title: Network
icon: mdi:network
path: network
views:
  # ── Overview View ────────────────────────────────────────────────────────
  - title: Overview
    icon: mdi:eye-outline
    cards:
      # Network Status Card
      - type: entities
        title: Network Status
        entities:
          - entity: binary_sensor.firewalla_network_connected
            name: Connected
          - entity: sensor.firewalla_connection_type
            name: Connection Type
          - entity: sensor.firewalla_public_ip
            name: Public IP
          - entity: sensor.firewalla_box_model
            name: Box Model
          - entity: sensor.firewalla_box_version
            name: Box Version
          - entity: sensor.firewalla_uptime
            name: Uptime

      # Live Speed Card
      - type: gauge
        title: Live Throughput
        entities:
          - entity: sensor.firewalla_download_speed
            name: Download
            min: 0
            max: 1000
            needle: false
            severity:
              green: 0
              yellow: 100
              red: 500
          - entity: sensor.firewalla_upload_speed
            name: Upload
            min: 0
            max: 500
            needle: false
            severity:
              green: 0
              yellow: 50
              red: 200

      # Device Counters Card
      - type: horizontal-stack
        cards:
          - type: statistic
            entity: sensor.firewalla_online_devices
            name: Online
            stat_type: last
            period:
              calendar:
                count: 1
                period: day
            graph: bar
          - type: statistic
            entity: sensor.firewalla_offline_devices
            name: Offline
            stat_type: last
            period:
              calendar:
                count: 1
                period: day
            graph: bar
          - type: statistic
            entity: sensor.firewalla_total_devices
            name: Total
            stat_type: last
            period:
              calendar:
                count: 1
                period: day
            graph: bar

      # Active Connections Card
      - type: gauge
        title: Active Connections
        entity: sensor.firewalla_active_connections
        min: 0
        max: 10000
        needle: false
        severity:
          green: 0
          yellow: 1000
          red: 5000

      # Data Usage Card
      - type: entities
        title: Monthly Data Usage
        entities:
          - entity: sensor.firewalla_monthly_download
            name: Download
          - entity: sensor.firewalla_monthly_upload
            name: Upload
          - entity: sensor.firewalla_monthly_total
            name: Total

      # Speedtest Card
      - type: entities
        title: Latest Speedtest
        entities:
          - entity: sensor.firewalla_speedtest_download
            name: Download
          - entity: sensor.firewalla_speedtest_upload
            name: Upload
          - entity: sensor.firewalla_speedtest_latency
            name: Latency

      # Alarms Card
      - type: entities
        title: Security Alerts
        entities:
          - entity: sensor.firewalla_active_alarms
            name: Active Alarms
          - entity: sensor.firewalla_latest_alarm
            name: Latest Alert

  # ── Devices View ─────────────────────────────────────────────────────────
  - title: Devices
    icon: mdi:devices
    cards:
      # Device Status Table
      - type: entities
        title: Device Status
        show_header_toggle: false
        entities:
          - entity: binary_sensor.goldfinger_online
            name: goldfinger
          - entity: binary_sensor.workphone_online
            name: WorkPhone
          - entity: binary_sensor.lauras-mbp_online
            name: Lauras-MBP
          - entity: binary_sensor.annakendrick_online
            name: AnnaKendrick
          - entity: binary_sensor.airplane_online
            name: Airplane
          - entity: binary_sensor.watch_online
            name: Watch
          - entity: binary_sensor.neo_online
            name: Neo

  # ── History View ─────────────────────────────────────────────────────────
  - title: History
    icon: mdi:chart-line
    cards:
      # Download Speed History
      - type: history-graph
        title: Download Speed (24h)
        entities:
          - entity: sensor.firewalla_download_speed

      # Upload Speed History
      - type: history-graph
        title: Upload Speed (24h)
        entities:
          - entity: sensor.firewalla_upload_speed

      # Device Count History
      - type: history-graph
        title: Device Count (24h)
        entities:
          - entity: sensor.firewalla_online_devices
          - entity: sensor.firewalla_offline_devices

      # Data Usage History
      - type: history-graph
        title: Data Usage (24h)
        entities:
          - entity: sensor.firewalla_monthly_download
          - entity: sensor.firewalla_monthly_upload
          - entity: sensor.firewalla_monthly_total
